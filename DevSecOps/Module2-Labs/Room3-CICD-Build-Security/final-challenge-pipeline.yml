## See task3-hardening.md for the answer

name: Deploy Pipeline

on:
  pull_request_target:          # Issue 1: runs with repo secrets for external PRs
    types: [opened, synchronize]

permissions:
  contents: write-all           # Issue 2: overly permissive

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3      # Issue 3: floating tag
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # Issue 1 continued: untrusted code

      - name: Setup Node
        uses: actions/setup-node@v3    # also floating tag
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install               # Issue 4: not npm ci (bypasses lockfile)
                                       # Issue 5: no --ignore-scripts (runs lifecycle PPE)

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Debug
        run: echo "Deploying with key ${{ secrets.API_KEY }}"   # Issue 6: secret in log

      - name: Deploy
        run: |
          ./deploy.sh ${{ github.event.pull_request.title }}    # Issue 7: script injection
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Issue 8: no artifact integrity check before deploy

      - name: Post deploy
        run: echo "Deployment complete"
