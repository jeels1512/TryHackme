name: CI/CD Pipeline

# VULNERABILITY 1: pull_request_target with untrusted code checkout
on:
  pull_request_target:
    types: [opened, synchronize]

# VULNERABILITY 2: Overly permissive token
permissions:
  contents: write-all

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # VULNERABILITY 1 (continued): Checks out untrusted PR branch code
      # while running with base repo secrets (pull_request_target context)
      - name: Checkout code
        uses: actions/checkout@v3          # VULNERABILITY 3: floating tag, not SHA-pinned
        with:
          ref: ${{ github.event.pull_request.head.sha }}   # untrusted code

      - name: Setup Node
        uses: actions/setup-node@v3        # also floating tag
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # VULNERABILITY 4: Secret echoed into build log
      - name: Debug info
        run: echo "Deploying with key ${{ secrets.DEPLOY_KEY }}"

      - name: Run tests
        run: npm test                       # runs attacker-controlled test scripts

      - name: Build
        run: npm run build

      # VULNERABILITY 5: Script injection via user-controlled PR title
      - name: Deploy
        run: ./deploy.sh ${{ github.event.pull_request.title }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Notify team
        run: |
          curl -X POST https://hooks.slack.com/services/${{ secrets.SLACK_TOKEN }} \
            -d '{"text": "Deploy complete for PR #${{ github.event.number }}"}'
